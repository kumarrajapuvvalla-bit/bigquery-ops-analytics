# Store this in ~/.dbt/profiles.yml — never commit with real credentials
# This file is for reference only; CI uses env vars

ops_analytics:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: ops_staging
      location: EU
      threads: 4
      timeout_seconds: 600
      priority: interactive
      retries: 1

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      dataset: ops_staging
      location: EU
      threads: 8
      timeout_seconds: 1800
      priority: batch
      retries: 2

    ci:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      dataset: "ops_ci_{{ env_var('PR_NUMBER', 'main') }}"
      location: EU
      threads: 4
      timeout_seconds: 600
      priority: interactive
      retries: 1
