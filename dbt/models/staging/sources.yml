version: 2

sources:
  - name: ops_raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: ops_raw
    description: "Raw ingestion layer — append-only event tables partitioned by date"
    tables:
      - name: fleet_events
        description: "Raw fleet and operational events"
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 2, period: hour}
          error_after: {count: 4, period: hour}
        columns:
          - name: event_key
            tests: [unique, not_null]
          - name: event_id
            tests: [not_null]
          - name: event_type
            tests:
              - accepted_values:
                  values: ['DEPLOY', 'SCALE', 'INCIDENT', 'ALERT', 'HEAL', 'ROLLBACK']
          - name: environment
            tests:
              - accepted_values:
                  values: ['dev', 'staging', 'prod']

      - name: slo_metrics
        description: "SLO snapshot time-series"
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 2, period: hour}
          error_after: {count: 6, period: hour}
        columns:
          - name: metric_key
            tests: [unique, not_null]

      - name: cost_billing_export
        description: "GCP billing export (detailed usage cost)"
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 26, period: hour}
          error_after: {count: 50, period: hour}
