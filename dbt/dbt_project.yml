name: ops_analytics
version: '1.0.0'
config-version: 2
profile: ops_analytics

model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
packages-install-path: dbt_packages

models:
  ops_analytics:
    staging:
      +materialized: view
      +schema: ops_staging
      +tags: ["staging"]
      +persist_docs:
        relation: true
        columns: true

    marts:
      +materialized: incremental
      +schema: ops_marts
      +tags: ["mart"]
      +partition_by:
        field: report_date
        data_type: date
        granularity: day
      +cluster_by: ["environment", "service_name"]
      +persist_docs:
        relation: true
        columns: true

    metrics:
      +materialized: view
      +schema: ops_metrics
      +tags: ["metrics"]

vars:
  lookback_days: 90
  anomaly_z_threshold: 3.0
  slo_window_days: 30
  cost_anomaly_horizon: 7

seeds:
  ops_analytics:
    +schema: ops_seeds
